<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAD Lita Digital</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#228B22"> 
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .card-container { max-width: 800px; margin: auto; background: white; border-radius: 15px; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .punto-acceso { 
            display: block; 
            color: #ccc; 
            font-size: 10px; 
            text-align: center; 
            margin-top: 30px; 
            padding: 10px; 
            cursor: pointer; 
            border-top: 1px solid #eee;
        }
        .hidden { display: none !important; }

/* ============================================================
   SECCIÓN: MODAL DE GESTIÓN (SISTEMA PLUS - GAD LITA)
   ============================================================ */

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.75); /* Oscurece el fondo */
    display: none; /* Se activa por JS */
    justify-content: center;
    align-items: center;
    z-index: 9999; /* Siempre por encima de todo */
    backdrop-filter: blur(3px); /* Efecto profesional de desenfoque */
}

.modal-content {
    background: #ffffff;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border-top: 5px solid #2c3e50; /* Color elegante acorde al sistema */
}

.modal-content h3 {
    margin-top: 0;
    color: #2c3e50;
    font-size: 1.4rem;
}

.input-estilizado {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px; /* Evita zoom automático en móviles */
    box-sizing: border-box;
}

.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 25px;
}

/* Tooltips para los botones de la tabla de administrador */
button[title]:hover::after {
    content: attr(title);
    position: absolute;
    background: #333;
    color: #fff;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 4px;
    top: -35px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    z-index: 10;
}

    </style>
    <style>
        #tablaReportes td:nth-child(6) {
            word-wrap: break-word;
            white-space: normal;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>

</head>
<body class="p-4">
    <div class="card-container p-6">
        <div class="text-center mb-8">
            <img src="logo.png" alt="GAD Lita" class="w-24 mx-auto mb-2">
            <h1 class="text-2xl font-bold text-blue-900">GAD PARROQUIAL LITA</h1>
            <p class="text-gray-500 text-xs uppercase">Reporte de Incidentes</p>
        </div>

        <div id="formReporte" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input type="text" id="cedula" maxlength="10" placeholder="Cédula (CI)" 
                    class="w-full p-3 border rounded-lg focus:outline-blue-500 font-mono bg-blue-50/50"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                
                <input type="text" id="nombre" placeholder="Nombre completo" 
                    class="md:col-span-2 w-full p-3 border rounded-lg bg-gray-100 text-gray-500" disabled>
            </div>

            <select id="sector" class="w-full p-3 border rounded-lg focus:outline-blue-500 bg-white">
                <option value="" disabled selected>Seleccione el sector del incidente...</option>
              
            </select>

            <textarea id="detalle" rows="3" placeholder="Descripción del incidente" class="w-full p-3 border rounded-lg focus:outline-blue-500"></textarea>
            
            <div class="flex flex-col space-y-2">
                <label class="text-[10px] font-bold text-blue-900 uppercase px-1">Evidencia Fotográfica (Máximo 3) 📸</label>
                
                <input type="file" id="fotoInput" accept="image/*" capture="camera" class="hidden">
                
                <button type="button" id="btnCapturar" onclick="document.getElementById('fotoInput').click()" 
                    class="w-full p-3 border-2 border-dashed border-blue-300 rounded-lg text-xs font-bold text-blue-700 bg-blue-50 hover:bg-blue-100 transition flex items-center justify-center gap-2">
                    <span>➕ AÑADIR FOTO</span>
                </button>

                <div id="previsualizacion" class="grid grid-cols-3 gap-2">
                    </div>
            </div>

            <button onclick="enviarReporte()" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md hover:bg-blue-800 transition">
                Enviar al GAD
            </button>
        </div>

        <div id="panelAdmin" class="hidden mt-8 border-t pt-6">
           
            <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">GESTION DE REPORTES</h2>

    <div class="flex gap-2">
        <button onclick="exportarExcel()" 
            class="bg-green-600 text-white px-4 py-2 rounded text-xs font-bold">
            Excel
        </button>

        <button onclick="cambiarClaveAdmin()" 
            class="bg-blue-600 text-white px-3 py-2 rounded text-xs font-bold">
            Cambio de Clave
        </button>
    </div>
</div>


           <div id="tablaReportes" class="overflow-x-auto border rounded-lg bg-white" style="max-height: 400px; overflow-y: auto;">
                </div>
            <button onclick="location.reload()" class="mt-6 text-gray-400 text-xs block mx-auto underline">Cerrar Sesión</button>
        </div>

        <div id="btnAccesoAdmin" class="punto-acceso" onclick="verificarAdmin()">Panel de Control .</div>
    </div>

    <script type="module" src="main.js"></script>

    <div id="modalGestion" class="modal-overlay" style="display: none;">
    <div class="modal-content relative">

        <!-- ❌ BOTÓN X (NUEVO) -->
        <button onclick="document.getElementById('modalGestion').style.display='none'"
            class="absolute top-3 right-3 text-gray-500 hover:text-red-600 text-xl font-bold">
            ✕
        </button>

        <h3 id="modalTitulo" class="text-green-700 font-bold">Gestión de Reporte</h3>
        <hr class="my-2 border-green-200">

        <div class="modal-body">
            <label for="comboMotivo" class="text-green-700 font-bold">Seleccione el motivo:</label>
            <select id="comboMotivo" class="input-estilizado border-green-300 focus:outline-green-500">
            </select>

            <div id="contenedorObservacion" style="margin-top: 15px;">
                <label for="txtObservacion" class="text-green-700 font-bold">Observaciones adicionales:</label>
                <textarea id="txtObservacion"
                    class="input-estilizado border-green-300 focus:outline-green-500"
                    placeholder="Escriba detalles aquí..."></textarea>
            </div>
        </div>

        <!-- ✅ FOOTER MODIFICADO -->
        <div class="modal-footer">
            <button id="btnConfirmarAccion"
                class="px-4 py-2 bg-green-600 text-white rounded-lg font-bold text-xs hover:bg-green-700 shadow-md">
                Confirmar
            </button>
        </div>

    </div>
</div>

<script type="module" src="main.js"></script>

<!-- 🔥 FILTRO TIPO EXCEL -->
<div id="filtroDropdown"
     class="hidden absolute bg-white border rounded shadow-lg p-2 text-xs z-50"
     style="min-width:200px;">
</div>

</body>
</html>
